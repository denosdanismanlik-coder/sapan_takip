name: sapan_takip
description: Sapan Takip Uygulaması

publish_to: 'none'

version: 1.0.0+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  image_picker: ^1.1.2
  firebase_storage: ^12.3.3
  excel: ^4.0.3
  mobile_scanner: ^7.1.4
  path_provider: ^2.1.5
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/anonim_logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
